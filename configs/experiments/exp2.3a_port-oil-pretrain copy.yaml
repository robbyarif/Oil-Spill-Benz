defaults:
  output_root: runs/exp2.3a_port-oil-pretrain
  save: true

experiments:
  - name: yolov11-exp2.3a-port-oil
    model: yolo
    dataset: datasets/processed/exp2.4-dv3train
    load:
      # version: 11
      weights: runs/exp2.2-port-oil/yolov11-exp2.2-port-oil/weights/best.pt
    params:
      epochs: 100 #200
      imgsz: 512
      batch: 8
      workers: 8
    test:
      enabled: true
      file_name: test.txt
      color_coded: true
      save: true

  - name: yolov12-exp2.3a-port-oil
    model: yolo
    dataset: datasets/processed/exp2.4-dv3train
    load:
      # version: 12
      weights: runs/exp2.2-port-oil/yolov12-exp2.2-port-oil/weights/best.pt
    params:
      epochs: 100 # 200
      imgsz: 512
      batch: 8
      workers: 8
    test:
      enabled: true
      file_name: test.txt
      color_coded: true
      save: true

  - name: deeplabv3-exp2.3a-port-oil
    model: deeplabv3
    dataset: datasets/processed/exp2.4-dv3train
    load:
      weights: runs/exp2.2-port-oil/deeplabv3-exp2.2-port-oil/weights/best.pt
    params:
      epochs: 100 #200
      batch: 8
      image_size: 512
      workers: 6
    test:
      enabled: true
      file_name: test.txt
      color_coded: true
      save: true

  - name: segformer-exp2.3a-port-oil
    model: segformer
    dataset: datasets/processed/exp2.4-dv3train
    load:
      weights: runs/exp2.2-port-oil/segformer-exp2.2-port-oil/weights/best.pt
    params:
      epochs: 100 #200
      batch: 4
      workers: 4
    test:
      enabled: true
      file_name: test.txt
      color_coded: true
      save: true
