defaults:
  output_root: runs/exp-manager-20260324
  save: true

experiments:
  - name: yolov11-exp4_dv3-dv4_crop
    model: yolo
    dataset: datasets/processed/exp4_dv3-dv4_crop
    load:
      version: 11
    params:
      epochs: 100
      imgsz: 512
      batch: 8
      workers: 8
    test:
      enabled: true
      file_name: test.txt
      color_coded: true
      save: true

  - name: yolov12-exp4_dv3-dv4_crop
    model: yolo
    dataset: datasets/processed/exp4_dv3-dv4_crop
    load:
      version: 12
    params:
      epochs: 100
      imgsz: 512
      batch: 8
      workers: 8
    test:
      enabled: true
      file_name: test.txt
      color_coded: true
      save: true

  - name: deeplabv3-exp4_dv3-dv4_crop
    model: deeplabv3
    dataset: datasets/processed/exp4_dv3-dv4_crop
    params:
      epochs: 100
      batch: 8
      image_size: 512
      workers: 6
    test:
      enabled: true
      file_name: test.txt
      color_coded: true
      save: true

  - name: segformer-exp4_dv3-dv4_crop
    model: segformer
    dataset: datasets/processed/exp4_dv3-dv4_crop
    params:
      epochs: 100
      batch: 4
      workers: 4
    test:
      enabled: true
      file_name: test.txt
      color_coded: true
      save: true

